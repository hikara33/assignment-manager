version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile 
    container_name: assignment-manager-test
    env_file:
      - .env.test
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run test
    restart: "no"

  db:
    image: postgres:16
    container_name: assignment-db-test
    env_file:
      - .env.test
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_test: